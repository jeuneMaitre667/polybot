# Dès qu’on push du code (surtout bot-24-7), mise à jour automatique des bots sur Lightsail.
# Prérequis : secrets dans le repo (Settings → Secrets and variables → Actions) :
#   Bot horaire : LIGHTSAIL_SSH_KEY, LIGHTSAIL_HOST
#   Bot 15m (optionnel) : LIGHTSAIL_SSH_KEY_15M (ou même clé que horaire), LIGHTSAIL_HOST_15M

name: Redeploy bot on Lightsail

on:
  push:
    branches: [main, master]
    paths:
      - 'bot-24-7/**'
      - '.github/workflows/redeploy-bot-lightsail.yml'
  workflow_dispatch: # Lancer à la main : Actions → Redeploy bot on Lightsail → Run workflow

jobs:
  redeploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy bot horaire via SSH
        env:
          SSH_KEY: ${{ secrets.LIGHTSAIL_SSH_KEY }}
          SSH_HOST: ${{ secrets.LIGHTSAIL_HOST }}
        run: |
          if [ -z "$SSH_KEY" ] || [ -z "$SSH_HOST" ]; then
            echo "::warning::LIGHTSAIL_SSH_KEY ou LIGHTSAIL_HOST manquant. Configure les secrets du repo."
            exit 0
          fi
          echo "$SSH_KEY" > key.pem
          chmod 600 key.pem
          ssh -i key.pem -o StrictHostKeyChecking=accept-new ubuntu@$SSH_HOST "bash ~/bot-24-7/redeploy.sh && bash ~/bot-24-7/verify-deploy.sh"
          rm -f key.pem

      - name: Deploy bot 15m via SSH
        env:
          SSH_KEY_15M: ${{ secrets.LIGHTSAIL_SSH_KEY_15M }}
          SSH_HOST_15M: ${{ secrets.LIGHTSAIL_HOST_15M }}
        run: |
          if [ -z "$SSH_HOST_15M" ]; then
            echo "LIGHTSAIL_HOST_15M non configuré — skip déploiement bot 15m."
            exit 0
          fi
          if [ -z "$SSH_KEY_15M" ]; then
            echo "::warning::LIGHTSAIL_SSH_KEY_15M manquant — skip déploiement bot 15m."
            exit 0
          fi
          echo "$SSH_KEY_15M" > key15m.pem
          chmod 600 key15m.pem
          ssh -i key15m.pem -o StrictHostKeyChecking=accept-new ubuntu@$SSH_HOST_15M "grep -q '^GIT_REPO_URL=' ~/bot-24-7/.env 2>/dev/null || echo 'GIT_REPO_URL=https://github.com/jeuneMaitre667/polybot.git' >> ~/bot-24-7/.env; bash ~/bot-24-7/redeploy.sh && bash ~/bot-24-7/verify-deploy.sh"
          rm -f key15m.pem
