name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Audit (high/critical, non bloquant)
        run: npm audit --audit-level=high || true
